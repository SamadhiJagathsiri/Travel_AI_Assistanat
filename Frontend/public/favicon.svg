<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Background Circle (the globe body) -->
  <circle cx="50" cy="50" r="45" fill="url(#grad)" />
  
  <!-- Latitude and Longitude Grid Lines -->
  <path d="M 10 50 H 90" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M 50 10 V 90" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  
  <!-- Curved Meridians (Longitude lines) -->
  <path d="M 50 10 C 25 30 25 70 50 90" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5" />
  <path d="M 50 10 C 75 30 75 70 50 90" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5" />
  
  <!-- Curved Parallels (Latitude lines) -->
  <path d="M 17 30 C 35 40 65 40 83 30" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5" />
  <path d="M 17 70 C 35 60 65 60 83 70" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5" />
</svg>